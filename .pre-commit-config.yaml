repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: backend-mypy
        name: backend mypy
        entry: uv run --project backend mypy --config-file backend/pyproject.toml
        language: system
        files: ^backend/
        pass_filenames: false
      - id: oxlint
        name: oxlint
        entry: npx --prefix frontend oxlint . --fix
        language: system
        files: ^frontend/.*\.(ts|vue)$
        pass_filenames: false
