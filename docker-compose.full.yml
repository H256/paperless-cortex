version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cortex-postgres
    environment:
      POSTGRES_DB: paperless_intelligence
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cortex-redis
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cortex-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: cortex-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # For GPU hosts, uncomment the following:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    restart: unless-stopped

  cortex:
    build: .
    container_name: paperless-ngx-cortex
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FRONTEND_DIST=/app/frontend/dist
      - DATABASE_URL=postgresql+psycopg://paperless:paperless@postgres:5432/paperless_intelligence
      - REDIS_HOST=redis
      - QUEUE_ENABLED=1
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
