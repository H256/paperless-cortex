    "tests/test_qdrant_service.py",
    "tests/test_similarity_service.py",
    "tests/test_writeback_preview_service.py",
    "tests/test_task_runs_service.py",
    "tests/test_writeback_selection_service.py",
    "tests/test_chat_routes.py",
    "tests/test_status_routes.py",
    "tests/test_meta_sync.py",
    "tests/test_sync_upsert_notes.py",
    "tests/test_documents_suggestions_routes.py",
    "tests/test_embeddings_routes.py",
    "tests/test_writeback_direct_service.py",
    "tests/test_queue_resilience.py",
    "tests/test_queue_routes_basic.py",
    "tests/test_queue_stats_self_heal.py",
    "tests/test_pipeline_similarity_index.py",
    "tests/test_worker_vision_suggestions.py",
    "tests/test_writeback_apply_service.py",
    "tests/test_embedding_chunk_budget.py",
    "tests/test_hierarchical_summary_parsing.py",
    "tests/test_pipeline_fanout_service.py",
    "tests/test_evidence_service.py",
    "tests/test_chat_evidence_routes.py",
    "tests/test_sync_meta_connections_routes.py",
    "tests/test_sync_routes_state.py",
    "tests/test_sync_documents_routes.py",
    "tests/test_process_missing_service.py",
    "tests/test_meta_routes.py",
    "tests/test_connections_service.py",
    "tests/test_connections_routes.py",
    "tests/test_large_doc_processing.py",
    "tests/test_queue_delayed_routes.py",
    "tests/test_queue_dlq_routes.py",
    "tests/test_worker_resume_checkpoint.py",
    "tests/test_worker_retry_checkpoint_sequence.py",
    "tests/test_queue_task_runs_routes.py",
    "tests/test_chat_service_evidence.py",
