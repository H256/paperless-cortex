    "app/routes/documents_similarity.py",
    "app/routes/meta.py",
    "app/routes/queue.py",
    "app/routes/queue_helpers.py",
    "app/routes/queue_guard.py",
    "app/routes/status.py",
    "app/routes/sync.py",
    "app/routes/documents_actions.py",
    "app/routes/documents.py",
    "app/routes/documents_suggestions.py",
    "app/routes/embeddings.py",
    "app/services/ai/__init__.py",
    "app/services/documents/__init__.py",
    "app/services/integrations/__init__.py",
    "app/services/pipeline/__init__.py",
