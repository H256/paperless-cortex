[project]
name = "paperless-intelligence-backend"
version = "0.4.2"
description = "FastAPI backend for Paperless Intelligence"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.112.0",
    "httpx>=0.27.0",
    "openai>=1.40.0",
    "pdfminer.six>=20221105",
    "pymupdf>=1.24.0",
    "python-dotenv>=1.0.1",
    "redis>=5.0.0",
    "sqlalchemy>=2.0.30",
    "psycopg[binary]>=3.2.3",
    "uvicorn>=0.30.0",
]

[tool.uv]
dev-dependencies = [
    "alembic>=1.13.2",
    "mypy>=1.15.0",
    "pytest>=8.3.0",
    "ruff>=0.6.0",
    "pre-commit>=4.0.0",
]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
follow_imports = "skip"
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
files = [
    "alembic/env.py",
    "scripts/export_openapi.py",
    "app/__init__.py",
    # Writeback services (already configured)
    "app/services/writeback/writeback_apply.py",
    "app/services/writeback/writeback_execution.py",
    "app/services/writeback/writeback_selection.py",
    "app/services/writeback/writeback_direct.py",
    "app/services/writeback/writeback_preview.py",
    "app/services/pipeline/worker_checkpoint.py",
    "app/routes/writeback_dryrun.py",
    "app/worker.py",
    # Runtime utilities (well-typed)
    "app/services/runtime/time_utils.py",
    "app/services/runtime/json_utils.py",
    "app/services/runtime/string_list_json.py",
    "app/services/runtime/logging_setup.py",
    # Documents utilities (simple, well-typed)
    "app/services/documents/documents.py",
    "app/services/documents/dashboard.py",
    "app/services/documents/page_types.py",
    "app/services/documents/note_ids.py",
    "app/services/documents/operations.py",
    "app/services/documents/pagination.py",
    "app/services/documents/text_cleaning.py",
    "app/services/documents/text_pages.py",
    "app/services/documents/document_stats.py",
    "app/services/documents/document_review.py",
    # AI services (core functionality)
    "app/services/ai/llm_client.py",
    "app/services/ai/ocr_scoring.py",
    "app/services/ai/chat.py",
    "app/services/ai/hierarchical_helpers.py",
    "app/services/ai/suggestions.py",
    "app/services/ai/vision_ocr.py",
    "app/services/ai/hierarchical_generation.py",
    "app/services/ai/hierarchical_summary.py",
    "app/services/ai/hierarchical_summary_pipeline.py",
    "app/services/ai/text_budget.py",
    "app/services/ai/json_extraction.py",
    # Search utilities
    "app/services/search/qdrant.py",
    "app/services/search/evidence_index.py",
    # Integration utilities
    "app/services/integrations/meta_upsert.py",
    # Pipeline utilities
    "app/services/pipeline/error_types.py",
    "app/services/pipeline/pipeline_fanout.py",
    "app/services/pipeline/queue.py",
    "app/services/pipeline/sync_state.py",
    "app/services/runtime/guard.py",
    # Config and exceptions
    "app/config.py",
    "app/db.py",
    "app/exceptions.py",
    "app/main.py",
    "app/version.py",
    # Additional well-typed services
    "app/services/documents/page_texts_merge.py",
    "app/services/documents/page_text_store.py",
    "app/services/ai/suggestion_store.py",
    "app/services/ai/hierarchical_storage.py",
    "app/services/integrations/meta_sync.py",
