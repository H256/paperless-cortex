[[tool.mypy.overrides]]
module = [
    "app.routes.writeback_dryrun",
    "app.worker",
]
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # function call in argument defaults (FastAPI uses this pattern)
]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["N999"]  # allow non-standard naming in migrations
"tests/*.py" = ["N802", "N803"]  # allow non-standard function/arg names in tests
"app/api_models.py" = ["N815"]  # preserve public API field names like documentType

[tool.ruff.lint.isort]
known-first-party = ["app"]



